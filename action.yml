name: WatchDocs
description: Automatically detects missing or outdated documentation based on PR changes, changelogs, Jira tickets, and Notion pages.
author: PBillingsby
branding:
  icon: eye
  color: green

inputs:
  anthropic_api_key:
    description: Anthropic API key
    required: true
  github_token:
    description: GitHub token for posting PR comments
    required: true
  mode:
    description: Run mode. 'analyze' (default) or 'draft'
    required: false
    default: analyze
  jira_url:
    description: Jira instance URL (optional)
    required: false
  jira_token:
    description: Jira API token (optional)
    required: false
  jira_email:
    description: Jira account email (optional)
    required: false
  notion_token:
    description: Notion integration token (optional)
    required: false

runs:
  using: node20
  main: dist/index.js